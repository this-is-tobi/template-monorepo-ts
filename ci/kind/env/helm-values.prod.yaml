api:
  image:
    registry: ""
    repository: template-monorepo-ts/api
    tag: prod
  migrate:
    registry: ""
    repository: template-monorepo-ts/api-migrate
    tag: prod
    # Bun needs writable fs to install/generate prisma client during migration
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      runAsUser: 1001
      runAsGroup: 1001
      readOnlyRootFilesystem: false
      capabilities:
        drop:
        - ALL
      seccompProfile:
        type: RuntimeDefault
  ingress:
    enabled: true
    className: traefik
    annotations: {}
    hosts:
    - name: api.domain.local
      path: /api
      pathType: Prefix
    - name: api.domain.local
      path: /swagger-ui
      pathType: Prefix
  # --- Security hardening ---
  # bun:1.3.12-distroless 'nonroot' user = UID 65532
  podSecurityContext:
    fsGroup: 65532
    runAsNonRoot: true
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    readOnlyRootFilesystem: true
    capabilities:
      drop:
      - ALL
    seccompProfile:
      type: RuntimeDefault
  # --- Autoscaling ---
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 80
  # --- Pod disruption budget ---
  pdb:
    enabled: true
    minAvailable: 1
  # --- Resources ---
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # --- Network policy ---
  networkPolicy:
    create: true
    policyTypes:
    - Ingress
    - Egress
    ingress:
    - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: traefik
      ports:
      - protocol: TCP
        port: 8080
    egress:
    # Allow DNS
    - to: []
      ports:
      - protocol: UDP
        port: 53
      - protocol: TCP
        port: 53
    # Allow PostgreSQL (CNPG)
    - to:
      - podSelector:
          matchLabels:
            cnpg.io/cluster: template-cnpg
      ports:
      - protocol: TCP
        port: 5432
    # Allow Redis
    - to:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: redis
      ports:
      - protocol: TCP
        port: 6379
      - protocol: TCP
        port: 26379
    # Allow Keycloak
    - to:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: keycloak
      ports:
      - protocol: TCP
        port: 8080
    # Allow OTel collector
    - to:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: opentelemetry-collector
      ports:
      - protocol: TCP
        port: 4318
    # Allow HTTPS egress (Prisma CLI engine checks)
    - to: []
      ports:
      - protocol: TCP
        port: 443
  # --- Scheduling ---
  serviceAccount:
    enabled: false
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
              - api
          topologyKey: kubernetes.io/hostname
  # --- Metrics ---
  metrics:
    enabled: true
    service:
      port: 9000
      targetPort: 9000
    serviceMonitor:
      enabled: true
      endpoints:
      - interval: 30s
        path: /metrics
        honorLabels: false
  # --- Environment variables ---
  env:
    DB__URL:
      valueFrom:
        secretKeyRef:
          name: template-cnpg-app
          key: uri
  envSecret:
    AUTH__SECRET: km6q6w57CLzHBvEXDXbw2UiW0UiKxC59KZFPATSG0
    AUTH__BASE_URL: http://api.domain.local
    AUTH__TRUSTED_ORIGINS: http://web.domain.local,http://api.domain.local
    AUTH__RATE_LIMIT_ENABLED: "false"
    ADMIN__EMAIL: admin@example.com
    ADMIN__PASSWORD: admin
    KEYCLOAK__CLIENT_SECRET: change-me
  envCm:
    API__VERSION: 0.1.0
    API__HOST: 0.0.0.0
    API__PORT: "8080"
    API__RATE_LIMIT_MAX: "2000"
    API__RATE_LIMIT_AUTH_MAX: "100"
    CHECKPOINT_DISABLE: "1"
    DO_NOT_TRACK: "1"
    PRISMA_TELEMETRY_INFORMATION: do-not-send
    OTEL_SERVICE_NAME: api
    OTEL_EXPORTER_OTLP_ENDPOINT: http://opentelemetry-collector:4318
    MODULES__AUTH: "true"
    MODULES__AUDIT: "true"
    KEYCLOAK__ENABLED: "true"
    KEYCLOAK__CLIENT_ID: template-monorepo-ts
    KEYCLOAK__ISSUER: http://template-keycloak:8080/realms/template-monorepo-ts
    KEYCLOAK__PUBLIC_URL: http://keycloak.domain.local/realms/template-monorepo-ts
    KEYCLOAK__MAP_ROLES: "true"
    KEYCLOAK__MAP_GROUPS: "true"
    KEYCLOAK__MAP_ORG_ROLES: "true"
  # --- Writable dirs for readOnlyRootFilesystem ---
  volumes:
  - name: tmp
    emptyDir: {}
  volumeMounts:
  - name: tmp
    mountPath: /tmp

docs:
  image:
    registry: ""
    repository: template-monorepo-ts/docs
    tag: prod
  ingress:
    enabled: true
    className: traefik
    annotations: {}
    hosts:
    - name: docs.domain.local
      path: /
      pathType: Prefix
  # --- Security hardening ---
  # nginx-unprivileged Dockerfile sets USER 1001
  podSecurityContext:
    fsGroup: 1001
    runAsNonRoot: true
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    readOnlyRootFilesystem: true
    capabilities:
      drop:
      - ALL
    seccompProfile:
      type: RuntimeDefault
  # --- Writable dirs for readOnlyRootFilesystem ---
  volumes:
  - name: tmp
    emptyDir: {}
  - name: cache
    emptyDir: {}
  volumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: cache
    mountPath: /var/cache/nginx
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  pdb:
    enabled: true
    minAvailable: 1
  networkPolicy:
    create: true
    policyTypes:
    - Ingress
    ingress:
    - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: traefik
      ports:
      - protocol: TCP
        port: 8080

mcp:
  image:
    registry: ""
    repository: template-monorepo-ts/mcp
    tag: prod
  envCm:
    TMTS_TRANSPORT: http
    TMTS_HTTP_PORT: 3100
    TMTS_SERVER_URL: "http://template-monorepo-ts-api:80"
  # --- Security hardening ---
  # bun:1.3.12-distroless 'nonroot' user = UID 65532
  podSecurityContext:
    fsGroup: 65532
    runAsNonRoot: true
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    readOnlyRootFilesystem: true
    capabilities:
      drop:
      - ALL
    seccompProfile:
      type: RuntimeDefault
  # --- Autoscaling ---
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 80
  # --- Pod disruption budget ---
  pdb:
    enabled: true
    minAvailable: 1
  # --- Resources ---
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # --- Network policy ---
  networkPolicy:
    create: true
    policyTypes:
    - Ingress
    - Egress
    ingress:
    # Only allow traffic from the ingress controller
    - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: traefik
      ports:
      - protocol: TCP
        port: 3100
    egress:
    # Allow DNS
    - to: []
      ports:
      - protocol: UDP
        port: 53
      - protocol: TCP
        port: 53
    # Allow API (the only backend MCP talks to)
    - to:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: template-template-monorepo-ts-api
      ports:
      - protocol: TCP
        port: 8080
    # Allow OTel collector
    - to:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: opentelemetry-collector
      ports:
      - protocol: TCP
        port: 4318
  # --- Scheduling ---
  serviceAccount:
    enabled: false
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
              - mcp
          topologyKey: kubernetes.io/hostname
  # --- Writable dirs for readOnlyRootFilesystem ---
  volumes:
  - name: tmp
    emptyDir: {}
  volumeMounts:
  - name: tmp
    mountPath: /tmp

web:
  image:
    registry: ""
    repository: template-monorepo-ts/web
    tag: prod
  envCm:
    API_URL: http://api.domain.local/api
    APP_VERSION: 0.1.0
  ingress:
    enabled: true
    className: traefik
    annotations: {}
    hosts:
    - name: web.domain.local
      path: /
      pathType: Prefix
  # --- Security hardening ---
  # nginx-unprivileged Dockerfile sets USER 1001
  # readOnlyRootFilesystem: false — entrypoint.sh writes config.js + nginx conf at startup
  podSecurityContext:
    fsGroup: 1001
    runAsNonRoot: true
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    readOnlyRootFilesystem: false
    capabilities:
      drop:
      - ALL
    seccompProfile:
      type: RuntimeDefault
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  pdb:
    enabled: true
    minAvailable: 1
  networkPolicy:
    create: true
    policyTypes:
    - Ingress
    ingress:
    - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: traefik
      ports:
      - protocol: TCP
        port: 8080

# ---------------------------------------------------------------------------
# Optional dependencies — production (HA, strict security, autoscaling, PDB,
# NetworkPolicies, monitoring, tuned resources).
# ---------------------------------------------------------------------------

cnpg:
  enabled: true
  dbName: app
  imageName: "ghcr.io/cloudnative-pg/postgresql:17.6"
  # 3-instance HA cluster with automatic failover.
  instances: 3
  credentials:
    username: app
    # Provide pre-created Kubernetes secrets in production instead of inline
    # passwords. Uncomment and fill in the secret names:
    # existingSecrets:
    #   enabled: true
    #   app:
    #     secretName: "postgres-app-credentials"
    #   postgres:
    #     secretName: "postgres-admin-credentials"
  infosSecret:
    create: true
  pvcSize:
    data: 10Gi
    wal: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  monitoring:
    # The chart sets both enablePodMonitor on the Cluster CR *and* creates a
    # PodMonitor template when enabled=true, causing SSA field-manager
    # conflicts with the operator-created PodMonitor. Disable the chart's
    # monitoring and create the PodMonitor via extraObjects instead.
    enabled: false
  backup:
    # Uncomment and configure to enable scheduled S3 backups:
    enabled: false
    # destinationPath: "s3://<bucket>/postgres-backups"
    # endpointURL: "https://s3.amazonaws.com"
    # retentionPolicy: "30d"
    # s3Credentials:
    #   create: false
    #   secretName: "s3-backup-credentials"
  # Spread instances across availability zones.
  affinity:
    topologyKey: topology.kubernetes.io/zone
  # NetworkPolicy: restrict access to the CNPG cluster.
  extraObjects:
  - apiVersion: monitoring.coreos.com/v1
    kind: PodMonitor
    metadata:
      name: "{{ include \"template.fullname\" . }}-monitor"
      namespace: "{{ .Release.Namespace }}"
    spec:
      selector:
        matchLabels:
          cnpg.io/cluster: "{{ include \"template.fullname\" . }}"
      podMetricsEndpoints:
      - port: metrics
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: "{{ include \"template.fullname\" . }}-network-policy"
      namespace: "{{ .Release.Namespace }}"
    spec:
      podSelector:
        matchLabels:
          cnpg.io/cluster: "{{ include \"template.fullname\" . }}"
      policyTypes:
      - Ingress
      ingress:
      # Allow CNPG operator to manage instances (status, failover).
      - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
        ports:
        - protocol: TCP
          port: 8000
      # Allow API pods to reach Postgres.
      - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: template-template-monorepo-ts-api
        ports:
        - protocol: TCP
          port: 5432
      # Allow intra-cluster replication between CNPG instances.
      - from:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: "{{ include \"template.fullname\" . }}"

cnpg-keycloak:
  enabled: true
  dbName: keycloak
  imageName: "ghcr.io/cloudnative-pg/postgresql:17.6"
  instances: 3
  credentials:
    username: keycloak
  infosSecret:
    create: true
  pvcSize:
    data: 5Gi
    wal: 2Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi
  monitoring:
    enabled: false
  backup:
    enabled: false
  affinity:
    topologyKey: topology.kubernetes.io/zone
  extraObjects:
  - apiVersion: monitoring.coreos.com/v1
    kind: PodMonitor
    metadata:
      name: "{{ include \"template.fullname\" . }}-monitor"
      namespace: "{{ .Release.Namespace }}"
    spec:
      selector:
        matchLabels:
          cnpg.io/cluster: "{{ include \"template.fullname\" . }}"
      podMetricsEndpoints:
      - port: metrics
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: "{{ include \"template.fullname\" . }}-network-policy"
      namespace: "{{ .Release.Namespace }}"
    spec:
      podSelector:
        matchLabels:
          cnpg.io/cluster: "{{ include \"template.fullname\" . }}"
      policyTypes:
      - Ingress
      ingress:
      # Allow CNPG operator to manage instances (status, failover).
      - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
        ports:
        - protocol: TCP
          port: 8000
      # Allow Keycloak pods to reach Postgres.
      - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
        ports:
        - protocol: TCP
          port: 5432
      # Allow intra-cluster replication between CNPG instances.
      - from:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: "{{ include \"template.fullname\" . }}"

redis:
  enabled: true
  # Sentinel-based replication: 1 master + 2 replicas with automatic failover.
  # Wire up the API to use Sentinel by adding these to api.envSecret:
  #   AUTH__REDIS_SENTINEL_URLS: "<release-name>-redis:26379"
  #   AUTH__REDIS_SENTINEL_MASTER: "mymaster"
  #   AUTH__REDIS_PASSWORD: "<redis-node-password>"
  #   AUTH__REDIS_SENTINEL_PASSWORD: "<sentinel-password>"  # omit if same as AUTH__REDIS_PASSWORD
  architecture: replication
  replicaCount: 3
  sentinel:
    enabled: true
    quorum: 2
    downAfterMilliseconds: 30000
    failoverTimeout: 180000
    redisShutdownWaitFailover: true
    preStop:
      enabled: true
  terminationGracePeriodSeconds: 60
  auth:
    enabled: true
    # existingSecret: "redis-credentials"
    # existingSecretPasswordKey: "password"
  persistence:
    enabled: true
    size: 5Gi
  # redis:7.4-bookworm 'redis' user = UID 999
  containerSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    runAsNonRoot: true
    privileged: false
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
      - ALL
    seccompProfile:
      type: RuntimeDefault
  podSecurityContext:
    fsGroup: 999
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  pdb:
    enabled: true
    minAvailable: 1
  serviceAccount:
    create: false
    automountServiceAccountToken: false
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
              - redis
          topologyKey: kubernetes.io/hostname
  topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: redis
  # NetworkPolicy: restrict Redis access to API pods only.
  extraObjects:
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: "{{ include \"redis.fullname\" . }}-network-policy"
      namespace: "{{ .Release.Namespace }}"
    spec:
      podSelector:
        matchLabels:
          app.kubernetes.io/name: redis
      policyTypes:
      - Ingress
      ingress:
      - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: template-template-monorepo-ts-api
        ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 6380
      # Allow intra-cluster Sentinel communication.
      - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
        ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 26379

keycloak:
  enabled: true
  replicaCount: 2
  keycloak:
    adminUser: admin
    # adminPassword set via existingSecret in production.
    # existingSecret: "keycloak-credentials"
    hostname: http://keycloak.domain.local
    httpEnabled: true
    production: false
    proxyHeaders: xforwarded
    # Enable Infinispan cache for multi-replica clustering.
  cache:
    stack: ispn
  realm:
    import: true
  extraVolumes:
  - name: realm-import
    configMap:
      name: template-template-monorepo-ts-keycloak-realm
  extraVolumeMounts:
  - name: realm-import
    mountPath: /opt/keycloak/data/import
    readOnly: true
  # Disable embedded Postgres — use the dedicated CNPG Keycloak cluster.
  postgres:
    enabled: false
  database:
    type: postgres
    host: template-cnpg-keycloak-rw
    port: "5432"
    name: keycloak
    existingSecret: template-cnpg-keycloak-app
    secretKeys:
      passwordKey: password
      usernameKey: username
  ingress:
    enabled: true
    className: ""
    hosts:
    - host: keycloak.domain.local
      paths:
      - path: /
        pathType: Prefix
  # keycloak:26.x 'keycloak' user = UID 1001, GID 1001
  containerSecurityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    readOnlyRootFilesystem: false
    capabilities:
      drop:
      - ALL
  podSecurityContext:
    fsGroup: 1001
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 2Gi
      cpu: 1000m
  metrics:
    enabled: true
    service:
      # Use a different port to avoid conflict with the management port (9000).
      port: 9001
    serviceMonitor:
      enabled: true
  serviceAccount:
    create: false
    automountServiceAccountToken: false
  pdb:
    enabled: true
    minAvailable: 1
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
              - keycloak
          topologyKey: kubernetes.io/hostname
  topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: keycloak
  # ConfigMap with the Keycloak realm export for automatic import on first boot.
  # NetworkPolicy: allow ingress from ingress controller and API pods only.
  extraObjects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: template-template-monorepo-ts-keycloak-realm
      namespace: "{{ .Release.Namespace }}"
    data:
      realm-export.json: |
        {
          "realm": "template-monorepo-ts",
          "enabled": true,
          "displayName": "Template Monorepo TS",
          "registrationAllowed": true,
          "registrationEmailAsUsername": false,
          "loginWithEmailAllowed": true,
          "duplicateEmailsAllowed": false,
          "resetPasswordAllowed": true,
          "editUsernameAllowed": false,
          "bruteForceProtected": true,
          "sslRequired": "none",
          "defaultSignatureAlgorithm": "RS256",
          "accessTokenLifespan": 300,
          "ssoSessionIdleTimeout": 1800,
          "ssoSessionMaxLifespan": 36000,
          "offlineSessionIdleTimeout": 2592000,
          "accessCodeLifespan": 60,
          "accessCodeLifespanUserAction": 300,
          "roles": {
            "realm": [
              {
                "name": "user",
                "description": "Default user role",
                "composite": false,
                "clientRole": false
              },
              {
                "name": "admin",
                "description": "Admin role with full access",
                "composite": false,
                "clientRole": false
              }
            ]
          },
          "defaultRoles": ["user"],
          "groups": [
            {
              "name": "users",
              "path": "/users",
              "realmRoles": ["user"]
            },
            {
              "name": "admins",
              "path": "/admins",
              "realmRoles": ["admin"]
            }
          ],
          "clients": [
            {
              "clientId": "template-monorepo-ts",
              "name": "Template Monorepo TS API",
              "description": "OAuth2/OIDC client for the API",
              "enabled": true,
              "protocol": "openid-connect",
              "publicClient": false,
              "secret": "change-me",
              "standardFlowEnabled": true,
              "directAccessGrantsEnabled": false,
              "serviceAccountsEnabled": false,
              "authorizationServicesEnabled": false,
              "implicitFlowEnabled": false,
              "frontchannelLogout": true,
              "fullScopeAllowed": true,
              "redirectUris": [
                "http://localhost:8081/api/v1/auth/oauth2/callback/keycloak",
                "http://localhost:3000/*",
                "http://api.domain.local/api/v1/auth/oauth2/callback/keycloak",
                "http://web.domain.local/*",
                "http://grafana.domain.local/*"
              ],
              "webOrigins": [
                "http://localhost:8081",
                "http://localhost:3000",
                "http://api.domain.local",
                "http://web.domain.local",
                "http://grafana.domain.local"
              ],
              "attributes": {
                "pkce.code.challenge.method": "S256",
                "post.logout.redirect.uris": "http://localhost:8081/*##http://localhost:3000/*##http://web.domain.local/*##http://grafana.domain.local/*",
                "backchannel.logout.session.required": "true",
                "backchannel.logout.revoke.offline.tokens": "false"
              },
              "defaultClientScopes": [
                "web-origins",
                "acr",
                "profile",
                "roles",
                "email",
                "basic"
              ],
              "optionalClientScopes": [
                "address",
                "phone",
                "offline_access",
                "microprofile-jwt"
              ],
              "protocolMappers": [
                {
                  "name": "realm-roles",
                  "protocol": "openid-connect",
                  "protocolMapper": "oidc-usermodel-realm-role-mapper",
                  "consentRequired": false,
                  "config": {
                    "multivalued": "true",
                    "id.token.claim": "true",
                    "access.token.claim": "true",
                    "userinfo.token.claim": "true",
                    "claim.name": "realm_roles",
                    "jsonType.label": "String"
                  }
                },
                {
                  "name": "groups",
                  "protocol": "openid-connect",
                  "protocolMapper": "oidc-group-membership-mapper",
                  "consentRequired": false,
                  "config": {
                    "full.path": "true",
                    "id.token.claim": "true",
                    "access.token.claim": "true",
                    "userinfo.token.claim": "true",
                    "claim.name": "groups",
                    "jsonType.label": "String"
                  }
                }
              ]
            }
          ],
          "scopeMappings": [
            {
              "client": "template-monorepo-ts",
              "roles": ["user"]
            }
          ],
          "users": [
            {
              "username": "user",
              "email": "user@example.com",
              "firstName": "Dev",
              "lastName": "User",
              "enabled": true,
              "emailVerified": true,
              "realmRoles": ["user"],
              "groups": ["/users"],
              "credentials": [
                {
                  "type": "password",
                  "value": "user",
                  "temporary": false
                }
              ]
            },
            {
              "username": "admin",
              "email": "admin@example.com",
              "firstName": "Dev",
              "lastName": "Admin",
              "enabled": true,
              "emailVerified": true,
              "realmRoles": ["admin"],
              "groups": ["/admins"],
              "credentials": [
                {
                  "type": "password",
                  "value": "admin",
                  "temporary": false
                }
              ]
            }
          ]
        }
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: "{{ include \"keycloak.fullname\" . }}-network-policy"
      namespace: "{{ .Release.Namespace }}"
    spec:
      podSelector:
        matchLabels:
          app.kubernetes.io/name: keycloak
      policyTypes:
      - Ingress
      ingress:
      # Allow API pods to reach Keycloak for OIDC token validation.
      - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: template-template-monorepo-ts-api
        ports:
        - protocol: TCP
          port: 8080
      # Allow Grafana pods to reach Keycloak for OIDC auth.
      - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
        ports:
        - protocol: TCP
          port: 8080
      # Allow ingress controller traffic.
      - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
        ports:
        - protocol: TCP
          port: 8080
      # Allow intra-cluster Infinispan Keycloak cache communication.
      - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
        ports:
        - protocol: TCP
          port: 7800

# ---------------------------------------------------------------------------
# Observability – prod (HA, persistent, monitored)
# ---------------------------------------------------------------------------

kube-prometheus-stack:
  enabled: true
  grafana:
    enabled: true
    replicas: 1
    persistence:
      enabled: false
    additionalDataSources:
    - name: Tempo
      type: tempo
      uid: tempo
      url: http://tempo:3200
      access: proxy
      isDefault: false
    ingress:
      enabled: true
    assertNoLeakedSecrets: false
    grafana.ini:
      server:
        root_url: http://grafana.domain.local
      auth.generic_oauth:
        enabled: true
        name: Keycloak
        allow_sign_up: true
        client_id: template-monorepo-ts
        client_secret: change-me
        scopes: openid profile email
        use_pkce: true
        auth_url: http://keycloak.domain.local/realms/template-monorepo-ts/protocol/openid-connect/auth
        token_url: http://template-keycloak:8080/realms/template-monorepo-ts/protocol/openid-connect/token
        api_url: http://template-keycloak:8080/realms/template-monorepo-ts/protocol/openid-connect/userinfo
        role_attribute_path: contains(realm_roles[*], 'admin') && 'GrafanaAdmin' || 'Viewer'
        role_attribute_strict: true
    podAntiAffinity: soft
    topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: grafana
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m
  prometheus:
    prometheusSpec:
      replicas: 2
      podAntiAffinity: soft
      externalLabels:
        cluster: prod
      retention: 30d
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 50Gi
      resources:
        requests:
          memory: 1Gi
          cpu: 500m
        limits:
          memory: 2Gi
          cpu: 1000m
  alertmanager:
    enabled: true
    alertmanagerSpec:
      replicas: 2
  nodeExporter:
    enabled: true
  kubeStateMetrics:
    enabled: true

tempo:
  enabled: true
  persistence:
    enabled: true
    size: 50Gi
  tempo:
    retention: 72h
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 1Gi
        cpu: 1000m
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: tempo
          topologyKey: topology.kubernetes.io/zone
  serviceMonitor:
    enabled: true

opentelemetry-collector:
  enabled: true
  replicaCount: 2
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
          topologyKey: topology.kubernetes.io/zone
  topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: opentelemetry-collector
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 500m
  serviceMonitor:
    enabled: true
