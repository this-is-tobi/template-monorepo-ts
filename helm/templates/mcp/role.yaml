{{- if and .Values.mcp.enabled .Values.mcp.serviceAccount.enabled .Values.mcp.serviceAccount.role.create .Values.mcp.serviceAccount.role.rules }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ printf "%s-%s" (include "helper.fullname" .) "mcp" }}
  labels: {{- (include "helper.labels" (dict "root" . "componentName" "mcp")) | nindent 4 }}
rules: {{- toYaml .Values.mcp.serviceAccount.role.rules | nindent 0 }}
{{- end }}
