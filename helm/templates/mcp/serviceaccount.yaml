{{- if and .Values.mcp.enabled .Values.mcp.serviceAccount.enabled .Values.mcp.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.mcp.serviceAccount.name | default (printf "%s-%s" (include "helper.fullname" .) "mcp") }}
  labels: {{- (include "helper.labels" (dict "root" . "componentName" "mcp")) | nindent 4 }}
  {{- if .Values.mcp.serviceAccount.annotations }}
  annotations:
    {{- tpl (toYaml .Values.mcp.serviceAccount.annotations) . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.mcp.serviceAccount.automountServiceAccountToken }}
{{- end }}
