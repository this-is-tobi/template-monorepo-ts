{{- if or .Values.api.envSecret .Values.global.envSecret -}}
kind: Secret
apiVersion: v1
metadata:
  name: {{ printf "%s-%s" (include "helper.fullname" .) "api" }}
  labels: {{- (include "helper.labels" (dict "root" . "componentName" "api")) | nindent 4 }}
data:
  {{- if .Values.global.envSecret -}}
  {{- include "helper.secret" .Values.global.envSecret | indent 2 }}
  {{- end -}}
  {{- if .Values.api.envSecret -}}
  {{- include "helper.secret" .Values.api.envSecret | indent 2 }}
  {{- end -}}
{{- end -}}
