{{- if and .Values.web.serviceAccount.enabled .Values.web.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.web.serviceAccount.name | default (printf "%s-%s" (include "helper.fullname" .) "web") }}
  labels: {{- (include "helper.labels" (dict "root" . "componentName" "web")) | nindent 4 }}
  {{- if .Values.web.serviceAccount.annotations }}
  annotations:
    {{- tpl (toYaml .Values.web.serviceAccount.annotations) . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.web.serviceAccount.automountServiceAccountToken }}
{{- end }}
