{{- if and .Values.web.serviceAccount.enabled .Values.web.serviceAccount.clusterRole.create .Values.web.serviceAccount.clusterRole.rules }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ printf "%s-%s" (include "helper.fullname" .) "web" }}
  labels: {{- (include "helper.labels" (dict "root" . "componentName" "web")) | nindent 4 }}
rules: {{- toYaml .Values.web.serviceAccount.clusterRole.rules | nindent 0 }}
{{- end }}
