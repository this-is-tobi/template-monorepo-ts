  # @section -- Api
  envFrom: []
  # - configMapRef:
  #     name: my-config
  # - secretRef:
  #     name: my-secret
  # -- Map or array of environment variables to inject into the app container (`valueFrom` supported).
  # @section -- Global
  env: {}
  # OTEL_SERVICE_NAME: "api"
  # OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  # OTEL_SDK_DISABLED: "false"
  # OTEL_METRICS_PORT: "9000"
  # A: "A"
  # B:
  #   valueFrom:
  #     configMapKeyRef:
  #       name: "my-config"
  #       key: "B"
  # C:
  #   valueFrom:
  #     secretKeyRef:
  #       name: "my-secret"
  #       key: "C"
  #
  # - name: "A"
  #   value: "A"
  # - name: "B"
  #   valueFrom:
  #     configMapKeyRef:
  #       name: "my-config"
  #       key: "B"
  # - name: "C"
  #   valueFrom:
  #     secretKeyRef:
  #       name: "my-secret"
  #       key: "C"
  # -- Map of environment variables to inject into a configmap loaded by the app container (`valueFrom` not supported).
  # @section -- Global
  envCm: {}
  # D: "D"
  # -- Map of environment variables to inject into a secret loaded by the app container (`valueFrom` not supported).
  # @section -- Global
  envSecret: {}
  # E: "E"
  probes:
    startupProbe:
      httpGet:
        # -- Api container healthcheck endpoint (startupProbe is defined using `toYaml` so it is possible to override it completely).
        # @section -- Api
        path: /api/v1/healthz
        # -- Port to use for healthcheck (defaults to container port).
        # @section -- Api
        port: *apiContainerPort
      # -- Number of seconds after the container has started before probe is initiated.
      # @section -- Api
      initialDelaySeconds: 0
      # -- Minimum consecutive successes for the probe to be considered successful after having failed.
      # @section -- Api
      successThreshold: 1
      # -- Minimum consecutive failures for the probe to be considered failed after having succeeded.
      # @section -- Api
      failureThreshold: 10
      # -- How often (in seconds) to perform the probe.
      # @section -- Api
      periodSeconds: 10
      # -- Number of seconds after which the probe times out.
      # @section -- Api
      timeoutSeconds: 5
    readinessProbe:
      httpGet:
        # -- Api container healthcheck endpoint (readinessProbe is defined using `toYaml` so it is possible to override it completely).
        # @section -- Api
        path: /api/v1/readyz
        # -- Port to use for healthcheck (defaults to container port).
        # @section -- Api
        port: *apiContainerPort
      # -- Number of seconds after the container has started before probe is initiated.
      # @section -- Api
      initialDelaySeconds: 10
      # -- Minimum consecutive successes for the probe to be considered successful after having failed.
      # @section -- Api
      successThreshold: 2
      # -- Minimum consecutive failures for the probe to be considered failed after having succeeded.
      # @section -- Api
      failureThreshold: 2
      # -- How often (in seconds) to perform the probe.
      # @section -- Api
      periodSeconds: 10
      # -- Number of seconds after which the probe times out.
      # @section -- Api
      timeoutSeconds: 5
    livenessProbe:
      httpGet:
        # -- Api container healthcheck endpoint (livenessProbe is defined using `toYaml` so it is possible to override it completely).
        # @section -- Api
        path: /api/v1/livez
        # -- Port to use for healthcheck (defaults to container port).
        # @section -- Api
        port: *apiContainerPort
      # -- Number of seconds after the container has started before probe is initiated.
      # @section -- Api
      initialDelaySeconds: 30
      # -- Minimum consecutive successes for the probe to be considered successful after having failed.
      # @section -- Api
      successThreshold: 1
      # -- Minimum consecutive failures for the probe to be considered failed after having succeeded.
      # @section -- Api
      failureThreshold: 3
      # -- How often (in seconds) to perform the probe.
      # @section -- Api
      periodSeconds: 30
      # -- Number of seconds after which the probe times out.
      # @section -- Api
      timeoutSeconds: 5
  strategy:
    # -- Strategy type used to replace old Pods by new ones, can be `Recreate` or `RollingUpdate`.
    # @section -- Api
    type: RollingUpdate
    rollingUpdate:
      # -- The maximum number of pods that can be unavailable during the update process.
      # @section -- Api
      maxUnavailable: 1
      # -- The maximum number of pods that can be scheduled above the desired number of pods.
      # @section -- Api
      maxSurge: 1
  # -- Image credentials configuration.
  # @section -- Api
  imagePullSecrets: []
  # - name: "pullsecret-name-1"
  #   create: false
  # - name: "pullsecret-name-2"
  #   create: true
  #   registry: ""
  #   username: ""
  #   password: ""
  #   email: ""
