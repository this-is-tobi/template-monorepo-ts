# Gateway API configuration (alternative to Ingress)
# Ref: https://gateway-api.sigs.k8s.io/
gateway:
  # -- Create a Gateway resource. Usually, you reference an existing Gateway managed by the infrastructure team.
  # @section -- Global
  create: false
  # -- Name of the Gateway resource. If not set, uses the release fullname.
  # @section -- Global
  name: ""
  # -- GatewayClass name. Required when creating a Gateway.
  # @section -- Global
  className: ""
  # -- Additional gateway annotations.
  # @section -- Global
  annotations: {}
  # -- Additional gateway labels.
  # @section -- Global
  labels: {}
  # -- Gateway addresses configuration.
  # @section -- Global
  addresses: []
  # - type: IPAddress
  #   value: "192.168.1.100"
  # - type: Hostname
  #   value: "gateway.example.com"
  # -- Gateway listeners configuration.
  # @section -- Global
  listeners: []
  # - name: http
  #   port: 80
  #   protocol: HTTP
  #   hostname: "*.example.com"
  #   allowedRoutes:
  #     namespaces:
  #       from: Same  # Same, All, or Selector
  #     kinds:
  #     - kind: HTTPRoute
  # - name: https
  #   port: 443
  #   protocol: HTTPS
  #   hostname: "*.example.com"
  #   tls:
  #     mode: Terminate  # Terminate or Passthrough
  #     certificateRefs:
  #     - kind: Secret
  #       name: example-com-tls
  #   allowedRoutes:
  #     namespaces:
  #       from: Same

api:
  # -- Should the app run as a StatefulSet instead of a Deployment.
  # @section -- Api
  statefulset: false
  # -- The number of application controller pods to run.
  # @section -- Api
  replicaCount: 1
  image:
    # -- Registry to use for the app.
    # @section -- Api
    registry: docker.io
    # -- Repository to use for the app.
    # @section -- Api
    repository: debian
    # -- Image pull policy for the app.
    # @section -- Api
    pullPolicy: IfNotPresent
    # -- Tag to use for the app.
    # @section -- Api
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""
  migrate:
    # -- Whether or not to add a migration init container to the api pod.
    # @section -- Api
    enabled: true
    # -- Registry to use for the migration init container image.
    # @section -- Api
    registry: docker.io
    # -- Repository to use for the migration init container image (Dockerfile "migrate" target).
    # @section -- Api
    repository: debian
    # -- Tag to use for the migration init container image.
    # @section -- Api
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""
  ingress:
    # -- Whether or not ingress should be enabled.
    # @section -- Api
    enabled: false
    # -- Defines which ingress controller will implement the resource.
    # @section -- Api
    className: ""
    # -- Additional ingress annotations.
    # @section -- Api
    annotations: {}
    # -- Additional ingress labels.
    # @section -- Api
    labels: {}
    hosts:
    - backend:
        # -- Name of the backend service linked to the host record (leave empty to use the app service).
        # @section -- Api
        serviceName: ""
        # -- Port used by the backend service linked to the host record (leave null to use the app service port).
        # @section -- Api
        portNumber: null
      # -- Name of the host record.
      # @section -- Api
      name: domain.local
      # -- Path type of the host record.
      # @section -- Api
      pathType: Prefix
      # -- Path of the host record to manage routing.
      # @section -- Api
      path: /
    # -- Enable TLS configuration.
    # @section -- Api
    tls: []
    # - secretName: domain.local-tls
    #   hosts:
    #   - domain.local
  # Gateway API HTTPRoute configuration (alternative to Ingress)
  # Ref: https://gateway-api.sigs.k8s.io/api-types/httproute/
  httpRoute:
    # -- Enable an HTTPRoute resource for this service.
    # @section -- Api
    enabled: false
    # -- Additional HTTPRoute annotations.
    # @section -- Api
    annotations: {}
    # -- Additional HTTPRoute labels.
    # @section -- Api
    labels: {}
    # -- Parent references (Gateways) to attach the HTTPRoute to.
    # @section -- Api
    parentRefs: []
    # - name: my-gateway
    #   namespace: gateway-namespace  # optional
    #   sectionName: https            # optional, specific listener name
    # -- Hostnames for the HTTPRoute to match.
    # @section -- Api
    hostnames: []
    # - "example.com"
    # - "api.example.com"
    # -- Routing rules for the HTTPRoute.
    # @section -- Api
    rules: []
    # - matches:
    #   - path:
    #       type: PathPrefix     # PathPrefix, Exact, or RegularExpression
    #       value: "/"
    #     headers:
    #     - type: Exact
    #       name: "x-version"
    #       value: "v1"
    #     method: GET
    #   filters:
    #   - type: RequestHeaderModifier
    #     requestHeaderModifier:
    #       add:
    #       - name: "x-custom-header"
    #         value: "my-value"
    #   backendRefs:
    #   - name: my-service       # defaults to chart service if not set
    #     port: 80               # defaults to service port if not set
    #     weight: 100            # for traffic splitting
  # Gateway API GRPCRoute configuration (for gRPC services)
  # Ref: https://gateway-api.sigs.k8s.io/api-types/grpcroute/
  grpcRoute:
    # -- Enable a GRPCRoute resource for this service.
    # @section -- Api
    enabled: false
    # -- Additional GRPCRoute annotations.
    # @section -- Api
    annotations: {}
    # -- Additional GRPCRoute labels.
    # @section -- Api
    labels: {}
    # -- Parent references (Gateways) to attach the GRPCRoute to.
    # @section -- Api
    parentRefs: []
    # - name: my-gateway
    #   namespace: gateway-namespace
    #   sectionName: grpc
    # -- Hostnames for the GRPCRoute to match.
    # @section -- Api
    hostnames: []
    # - "grpc.example.com"
    # -- Routing rules for the GRPCRoute.
    # @section -- Api
    rules: []
    # - matches:
    #   - method:
    #       type: Exact          # Exact or RegularExpression
    #       service: "mypackage.MyService"
    #       method: "MyMethod"
    #     headers:
    #     - type: Exact
    #       name: "x-version"
    #       value: "v1"
    #   backendRefs:
    #   - name: my-grpc-service
    #     port: 50051
    #     weight: 100
  # -- Annotations for the app deployed pods.
  # @section -- Api
  podAnnotations: {}
  # -- Labels for the app deployed pods.
  # @section -- Api
  podLabels: {}
  # -- Toggle and define pod-level security context.
  # @section -- Api
  podSecurityContext: {}
  # fsGroup: 2000
  # -- Extra init containers to add to the app pod.
  # @section -- Api
  initContainers: []
  # - name: wait-for-keycloak
  #   image: docker.io/curlimages/curl:latest
  #   command:
  #   - "/bin/sh"
  #   - "-c"
  #   args:
  #   - "while [ $(curl -sw '%{http_code}' http://webapp.svc.cluster.local -o /dev/null) -ne 200 ]; do sleep 5; echo 'Waiting for the webapp...'; done"
  #   volumeMounts:
  #   - mountPath: /custom-volume
  #     name: custom-volume
  # -- Extra containers to add to the app pod as sidecars.
  # @section -- Api
  extraContainers: []
  # - name: fluentd
  #   image: "fluentd"
  #   volumeMounts:
  #     - mountPath: /my-volume/config
  #       name: config
  # -- Api container port number.
  # @section -- Api
  containerPort: &apiContainerPort 8080
  # -- Api container port name.
  # @section -- Api
  containerPortName: http
  # -- Api extra container ports.
  # @section -- Api
  extraPorts: []
  # - containerPort: 9090
  #   protocol: "TCP"
  # -- Api container command.
  # @section -- Api
  command: []
  # -- Api container command args.
  # @section -- Api
  args: []
