  #     topologyKey: "kubernetes.io/hostname"
  serviceAccount:
    # -- Enable the service account.
    # @section -- Api
    enabled: false
    # -- Create a service account.
    # @section -- Api
    create: false
    # -- Annotations applied to created service account.
    # @section -- Api
    annotations: {}
    # -- Service account name.
    # @section -- Api
    name: ""
    # -- Should the service account access token be automount in the pod.
    # @section -- Api
    automountServiceAccountToken: false
    role:
      # -- Should the role be created.
      # @section -- Api
      create: false
      # -- Role rules associated with the service account.
      # @section -- Api
      rules: []
      # - apiGroups:
      #   - argoproj.io
      #   resources:
      #   - applications
      #   - applicationsets
      #   - appprojects
      #   verbs:
      #   - create
      #   - get
      #   - list
      #   - watch
      #   - update
      #   - delete
      #   - patch
    clusterRole:
      # -- Should the clusterRole be created.
      # @section -- Api
      create: false
      # -- ClusterRole rules associated with the service account.
      # @section -- Api
      rules: []
      # - apiGroups:
      #   - argoproj.io
      #   resources:
      #   - applications
      #   - applicationsets
      #   - appprojects
      #   verbs:
      #   - create
