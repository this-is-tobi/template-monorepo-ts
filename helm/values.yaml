# PostgreSQL via CloudNative-PG operator.
# Ref: https://artifacthub.io/packages/helm/this-is-tobi-helm-charts/cnpg-cluster
cnpg:
  # -- Enable the cnpg-cluster dependency.
  # @section -- Cnpg
  enabled: false
  # -- Name of the PostgreSQL database (defaults to release name when empty).
  # @section -- Cnpg
  dbName: app
  # -- CNPG PostgreSQL image.
  # @section -- Cnpg
  imageName: "ghcr.io/cloudnative-pg/postgresql:17.6"
  # -- Number of PostgreSQL instances (1 for dev, 3 for HA prod).
  # @section -- Cnpg
  instances: 3
  credentials:
    # -- Database application username.
    # @section -- Cnpg
    username: app
    # -- Database application password (auto-generated by operator when empty).
    # @section -- Cnpg
    password: ""
    # -- Postgres superuser password (auto-generated by operator when empty).
    # @section -- Cnpg
    postgresPassword: ""
    existingSecrets:
      # -- Load credentials from pre-existing Kubernetes secrets (recommended for production).
      # @section -- Cnpg
      enabled: false
      app:
        # -- Name of the secret containing app user credentials (type: kubernetes.io/basic-auth).
        # @section -- Cnpg
        secretName: ""
      postgres:
        # -- Name of the secret containing superuser credentials (type: kubernetes.io/basic-auth).
        # @section -- Cnpg
        secretName: ""
  infosSecret:
    # -- Create a secret with DB connection info (DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASS, DB_URL).
    # @section -- Cnpg
    create: true
    # -- Name of the secret (defaults to <release>-cnpg-infos when empty).
    # @section -- Cnpg
    secretName: ""
    keys:
      host: DB_HOST
      port: DB_PORT
      name: DB_NAME
      user: DB_USER
      password: DB_PASS
      url: DB_URL
    # -- Optional query parameters appended to the connection URL (e.g. "sslmode=require").
    # @section -- Cnpg
    urlParameters: ""
  pvcSize:
    # -- Size of the data PVC per instance.
    # @section -- Cnpg
    data: 3Gi
    # -- Size of the WAL PVC per instance (null to store WAL in the data PVC).
    # @section -- Cnpg
    wal: 2Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  monitoring:
    # -- Enable PodMonitor for Prometheus Operator scraping.
    # @section -- Cnpg
    enabled: false
  backup:
    # -- Enable scheduled S3 backups.
    # @section -- Cnpg
    enabled: false
    # destinationPath: "s3://<bucket>/postgres-backups"
    # endpointURL: "https://s3.amazonaws.com"
    # retentionPolicy: "30d"
    # s3Credentials:
    #   create: false
    #   secretName: "s3-backup-credentials"
  # -- Topology key used for pod anti-affinity (spread instances across zones).
  # @section -- Cnpg
  affinity:
    topologyKey: topology.kubernetes.io/zone
  # ---------------------------------------------------------------------------
  # PgBouncer connection pooler (disabled by default).
  #
  # Recommendation: enable for bursty/short-lived workloads with many replicas
  # (e.g. serverless, horizontal autoscaling). Keep disabled for low-concurrency
  # setups — PgBouncer transaction-mode pooling is incompatible with some Prisma
  # features (SET, advisory locks) and requires adding "pgbouncer=true" to the
  # DATABASE_URL so Prisma disables those features.
  #
  # When enabled, the rw service name changes to <release>-pooler-rw:5432.
  # Update the cnpg.infosSecret.keys.host (or DB_HOST env) accordingly.
  # ---------------------------------------------------------------------------
  # pooler:
  #   enabled: true
  #   instances: 3                # Match number of API replicas / HPA max.
  #   type: "rw"                  # "rw" (primary) or "ro" (replicas).
  #   pgbouncer:
  #     poolMode: transaction     # transaction | session | statement
  #     maxClientConn: 1000
  #     defaultPoolSize: 25
  # -- Extra NetworkPolicy or other objects deployed alongside the cluster.
  # @section -- Cnpg
  extraObjects: []

# Redis in-memory cache / session store.
# Ref: https://artifacthub.io/packages/helm/cloudpirates-redis/redis
redis:
  # -- Enable the redis dependency.
  # @section -- Redis
  enabled: false
  # -- Redis deployment architecture: standalone | replication | cluster.
  # @section -- Redis
  architecture: standalone
  auth:
    # -- Enable Redis password authentication.
    # @section -- Redis
    enabled: true
    # -- Redis password (auto-generated when empty).
    # @section -- Redis
    password: ""
  persistence:
    # -- Enable persistent storage for Redis data.
    # @section -- Redis
    enabled: true
    size: 2Gi
  containerSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    runAsNonRoot: true
    privileged: false
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
      - ALL
    seccompProfile:
      type: RuntimeDefault
  podSecurityContext:
    fsGroup: 999
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  metrics:
    # -- Enable Prometheus redis-exporter sidecar.
    # @section -- Redis
    enabled: false
  pdb:
    # -- Enable PodDisruptionBudget.
    # @section -- Redis
    enabled: false
    minAvailable: 1
  serviceAccount:
    create: false
    automountServiceAccountToken: false
  # -- Extra NetworkPolicy or other objects deployed alongside Redis.
  # @section -- Redis
  extraObjects: []

# Keycloak Identity & Access Management (OIDC / OAuth2).
# Ref: https://artifacthub.io/packages/helm/cloudpirates-keycloak/keycloak
keycloak:
  # -- Enable the keycloak dependency.
  # @section -- Keycloak
  enabled: false
  replicaCount: 1
  keycloak:
    # -- Keycloak admin username.
    # @section -- Keycloak
    adminUser: admin
    # -- Keycloak admin password (auto-generated when empty).
    # @section -- Keycloak
    adminPassword: ""
    # -- Keycloak public hostname (required for production mode).
    # @section -- Keycloak
    hostname: ""
    httpEnabled: true
    # -- Enable Keycloak production hardening (disables HTTP, enforces strict TLS).
    # @section -- Keycloak
    production: false
    # -- Proxy header mode: forwarded | xforwarded.
    # @section -- Keycloak
    proxyHeaders: xforwarded
  # Embedded PostgreSQL for Keycloak (disable in production and use an external DB).
  postgres:
    enabled: true
    auth:
      database: keycloak
      username: keycloak
      password: ""
  database:
    type: postgres
  containerSecurityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    readOnlyRootFilesystem: false
    capabilities:
      drop:
      - ALL
  podSecurityContext:
    fsGroup: 1001
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 500m
  metrics:
    # -- Enable Keycloak metrics endpoint.
    # @section -- Keycloak
    enabled: false
  serviceAccount:
    create: false
    automountServiceAccountToken: false
  pdb:
    # -- Enable PodDisruptionBudget for Keycloak.
    # @section -- Keycloak
    enabled: false
  # -- Extra NetworkPolicy or other objects deployed alongside Keycloak.
  # @section -- Keycloak
  extraObjects: []

# ---------------------------------------------------------------------------
# Observability stack
# ---------------------------------------------------------------------------
# Three optional components that mirror the docker-compose OTel stack:
#   API → OTel Collector → Tempo (traces) + Prometheus (metrics) + Grafana (UI)
# Enable all three together or individually per environment.
# ---------------------------------------------------------------------------

# Prometheus + Grafana + AlertManager + kube-state-metrics + node-exporter.
# Ref: https://artifacthub.io/packages/helm/prometheus-community/kube-prometheus-stack
kube-prometheus-stack:
  # -- Enable the kube-prometheus-stack dependency.
  # @section -- kube-prometheus-stack
  enabled: false

  grafana:
    # -- Enable embedded Grafana deployment.
    # @section -- kube-prometheus-stack
    enabled: true
    # -- Grafana admin password (auto-generated when empty).
    # @section -- kube-prometheus-stack
    adminPassword: ""
    # Pre-configure the Tempo tracing datasource.
    additionalDataSources:
    - name: Tempo
      type: tempo
      uid: tempo
      url: http://tempo:3200
      access: proxy
      isDefault: false
    ingress:
      enabled: false
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 200m
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
        - ALL
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 472
      fsGroup: 472
      seccompProfile:
        type: RuntimeDefault

  prometheus:
    prometheusSpec:
      # Pick up ServiceMonitors and PodMonitors from all namespaces.
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      # -- Prometheus metrics retention period.
      # @section -- kube-prometheus-stack
      retention: 15d
      resources:
        requests:
          memory: 512Mi
          cpu: 250m
        limits:
          memory: 1Gi
          cpu: 500m

  alertmanager:
    # -- Enable AlertManager.
    # @section -- kube-prometheus-stack
    enabled: false

  # Disable sub-components that are not useful in all environments.
  kubeStateMetrics:
    enabled: true
  nodeExporter:
    enabled: true

# Grafana Tempo – distributed tracing backend (single-binary mode).
# Ref: https://artifacthub.io/packages/helm/grafana-community/tempo
# Note: fullnameOverride is set to "tempo" so the OTel collector can resolve it
#       via a stable DNS name regardless of the Helm release name.
tempo:
  # -- Enable the Tempo dependency.
  # @section -- Tempo
  enabled: false
  # Fix the service name so the OTel collector exporter can use "tempo" as host.
  fullnameOverride: tempo
  replicas: 1
  persistence:
    # -- Enable persistent storage for traces.
    # @section -- Tempo
    enabled: false
    size: 10Gi
  tempo:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
    # -- Trace retention window.
    # @section -- Tempo
    retention: 24h
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m
    securityContext:
      runAsNonRoot: true
      runAsUser: 10001
      runAsGroup: 10001
      fsGroup: 10001
  serviceMonitor:
    enabled: false

# OpenTelemetry Collector – receives OTLP from the API, fans out to Tempo & Prometheus.
# Ref: https://artifacthub.io/packages/helm/opentelemetry-helm/opentelemetry-collector
# Uses the k8s collector image which bundles all contrib receivers/processors.
# Note: fullnameOverride is set to "opentelemetry-collector" so the API can always point
#       OTEL_EXPORTER_OTLP_ENDPOINT at http://opentelemetry-collector:4318 regardless
#       of the Helm release name.
opentelemetry-collector:
  # -- Enable the OpenTelemetry Collector dependency.
  # @section -- OpenTelemetry Collector
  enabled: false
  # Fix the service name so the API exporter can use "opentelemetry-collector" as host.
  fullnameOverride: opentelemetry-collector
  mode: deployment
  image:
    # Full k8s distribution – includes spanmetrics connector, k8sattributes, etc.
    repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-k8s
  command:
    name: otelcol-k8s
  replicaCount: 1
  # Full collector config mirroring the docker-compose OTel stack:
  #   - OTLP receiver (gRPC 4317 / HTTP 4318)
  #   - spanmetrics connector (generates RED metrics from traces)
  #   - batch processor
  #   - otlphttp exporter → Tempo
  #   - prometheus exporter → scraped by kube-prometheus-stack
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    connectors:
      spanmetrics:
        histogram:
          explicit:
            buckets: [0.002, 0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5, 10]
        dimensions:
        - name: http.route
        - name: http.request.method
        - name: http.response.status_code
        - name: db.system.name
        - name: model
        - name: method
        dimensions_cache_size: 1000
        aggregation_temporality: AGGREGATION_TEMPORALITY_CUMULATIVE
    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024
    exporters:
      otlphttp/tempo:
        endpoint: http://tempo:4318
      prometheus:
        endpoint: 0.0.0.0:8889
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp/tempo, spanmetrics]
        metrics:
          receivers: [otlp, spanmetrics]
          processors: [batch]
          exporters: [prometheus]
  # Expose OTLP ports so API pods can push telemetry.
  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      protocol: TCP
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      protocol: TCP
    # Prometheus scrape endpoint for span-generated metrics.
    metrics:
      enabled: true
      containerPort: 8889
      servicePort: 8889
      protocol: TCP
  serviceMonitor:
    enabled: false
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 250m
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    seccompProfile:
      type: RuntimeDefault
