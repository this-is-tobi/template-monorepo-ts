  probes:
    startupProbe:
      httpGet:
        # -- Docs container healthcheck endpoint (startupProbe is defined using `toYaml` so it is possible to override it completely).
        # @section -- Docs
        path: /
        # -- Port to use for healthcheck (defaults to container port).
        # @section -- Docs
        port: *docsContainerPort
      # -- Number of seconds after the container has started before probe is initiated.
      # @section -- Docs
      initialDelaySeconds: 0
      # -- Minimum consecutive successes for the probe to be considered successful after having failed.
      # @section -- Docs
      successThreshold: 1
      # -- Minimum consecutive failures for the probe to be considered failed after having succeeded.
      # @section -- Docs
      failureThreshold: 10
      # -- How often (in seconds) to perform the probe.
      # @section -- Docs
      periodSeconds: 10
      # -- Number of seconds after which the probe times out.
      # @section -- Docs
      timeoutSeconds: 5
    readinessProbe:
      httpGet:
        # -- Docs container healthcheck endpoint (readinessProbe is defined using `toYaml` so it is possible to override it completely).
        # @section -- Docs
        path: /
        # -- Port to use for healthcheck (defaults to container port).
        # @section -- Docs
        port: *docsContainerPort
      # -- Number of seconds after the container has started before probe is initiated.
      # @section -- Docs
      initialDelaySeconds: 10
      # -- Minimum consecutive successes for the probe to be considered successful after having failed.
      # @section -- Docs
      successThreshold: 2
      # -- Minimum consecutive failures for the probe to be considered failed after having succeeded.
      # @section -- Docs
      failureThreshold: 2
      # -- How often (in seconds) to perform the probe.
      # @section -- Docs
      periodSeconds: 10
      # -- Number of seconds after which the probe times out.
      # @section -- Docs
      timeoutSeconds: 5
    livenessProbe:
      httpGet:
        # -- Docs container healthcheck endpoint (livenessProbe is defined using `toYaml` so it is possible to override it completely).
        # @section -- Docs
        path: /
        # -- Port to use for healthcheck (defaults to container port).
        # @section -- Docs
        port: *docsContainerPort
      # -- Number of seconds after the container has started before probe is initiated.
      # @section -- Docs
      initialDelaySeconds: 30
      # -- Minimum consecutive successes for the probe to be considered successful after having failed.
      # @section -- Docs
      successThreshold: 1
      # -- Minimum consecutive failures for the probe to be considered failed after having succeeded.
      # @section -- Docs
      failureThreshold: 3
      # -- How often (in seconds) to perform the probe.
      # @section -- Docs
      periodSeconds: 30
      # -- Number of seconds after which the probe times out.
      # @section -- Docs
      timeoutSeconds: 5
