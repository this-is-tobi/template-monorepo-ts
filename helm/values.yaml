  #   mountPropagation: None
  #   recursiveReadOnly: Enabled
  # - name: cache-volume
  #   mountPath: /app/cache
  # - name: image-volume
  #   mountPath: /app/content
  # - name: storage-volume
  #   mountPath: /app/storage
  service:
    # -- Type of service to create for the app.
    # @section -- Api
    type: ClusterIP
    # -- Port used by the service.
    # @section -- Api
    port: 80
    # -- Port used when type is `NodePort` to expose the service on the given node port.
    # @section -- Api
    nodePort: 31000
    # -- Port name used by the service.
    # @section -- Api
    portName: http
    # -- Protocol used by the service.
    # @section -- Api
    protocol: TCP
    # -- Extra service ports.
    # @section -- Api
    extraPorts: []
    # - port: 9090
    #   targetPort: 9090
    #   protocol: "TCP"
    #   name: "metrics"
  resources:
    requests:
      # -- Memory request for the app.
      # @section -- Api
      memory: 256Mi
      # -- CPU request for the app.
      # @section -- Api
      cpu: 100m
      # Other stuff like GPU, etc could be added here.
      # nvidia.com/gpu: "1"
      # ephemeral-storage: "100Mi"
    limits:
      # -- Memory limit for the app.
      # @section -- Api
      memory: 2Gi
      # -- CPU limit for the app.
      # @section -- Api
      cpu: 500m
      # Other stuff like GPU, etc could be added here.
      # nvidia.com/gpu: "1"
      # ephemeral-storage: "500Mi"
  autoscaling:
    # -- Enable Horizontal Pod Autoscaler for the app.
    # @section -- Api
    enabled: false
    # -- Minimum number of replicas for the app.
    # @section -- Api
    minReplicas: 1
    # -- Maximum number of replicas for the app.
    # @section -- Api
    maxReplicas: 3
    # -- Average CPU utilization percentage for the app.
    # @section -- Api
    targetCPUUtilizationPercentage: 80
    # -- Average memory utilization percentage for the app.
    # @section -- Api
    targetMemoryUtilizationPercentage: 80
  # -- Revision history limit for the app.
  # @section -- Api
  revisionHistoryLimit: 10
  # -- Default node selector for app.
  # @section -- Api
  nodeSelector: {}
  # kubernetes.io/os: "linux"
  # kubernetes.io/arch: "amd64"
  # kubernetes.io/hostname: "node1"
  # -- Default tolerations for app.
  # @section -- Api
  tolerations: []
  # - key: "key1"
  #   operator: "Equal"
  #   value: "value1"
  #   effect: "NoSchedule"
