# Gateway API configuration (alternative to Ingress)
# Ref: https://gateway-api.sigs.k8s.io/
gateway:
  # -- Create a Gateway resource. Usually, you reference an existing Gateway managed by the infrastructure team.
  # @section -- Global
  create: false
  # -- Name of the Gateway resource. If not set, uses the release fullname.
  # @section -- Global
  name: ""
  # -- GatewayClass name. Required when creating a Gateway.
  # @section -- Global
  className: ""
  # -- Additional gateway annotations.
  # @section -- Global
  annotations: {}
  # -- Additional gateway labels.
  # @section -- Global
  labels: {}
  # -- Gateway addresses configuration.
  # @section -- Global
  addresses: []
  # - type: IPAddress
  #   value: "192.168.1.100"
  # - type: Hostname
  #   value: "gateway.example.com"
  # -- Gateway listeners configuration.
  # @section -- Global
  listeners: []
  # - name: http
  #   port: 80
  #   protocol: HTTP
  #   hostname: "*.example.com"
  #   allowedRoutes:
  #     namespaces:
  #       from: Same  # Same, All, or Selector
  #     kinds:
  #     - kind: HTTPRoute
  # - name: https
  #   port: 443
  #   protocol: HTTPS
  #   hostname: "*.example.com"
  #   tls:
  #     mode: Terminate  # Terminate or Passthrough
  #     certificateRefs:
  #     - kind: Secret
  #       name: example-com-tls
  #   allowedRoutes:
  #     namespaces:
  #       from: Same

api:
  # -- Should the app run as a StatefulSet instead of a Deployment.
  # @section -- Api
  statefulset: false
  # -- The number of application controller pods to run.
  # @section -- Api
  replicaCount: 1
  image:
    # -- Registry to use for the app.
    # @section -- Api
    registry: docker.io
    # -- Repository to use for the app.
    # @section -- Api
    repository: debian
    # -- Image pull policy for the app.
    # @section -- Api
    pullPolicy: IfNotPresent
    # -- Tag to use for the app.
    # @section -- Api
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""
  ingress:
    # -- Whether or not ingress should be enabled.
    # @section -- Api
    enabled: false
    # -- Defines which ingress controller will implement the resource.
    # @section -- Api
    className: ""
    # -- Additional ingress annotations.
    # @section -- Api
    annotations: {}
    # -- Additional ingress labels.
    # @section -- Api
    labels: {}
    hosts:
    - backend:
        # -- Name of the backend service linked to the host record (leave empty to use the app service).
        # @section -- Api
        serviceName: ""
        # -- Port used by the backend service linked to the host record (leave null to use the app service port).
        # @section -- Api
        portNumber: null
        # -- Name of the host record.
        # @section -- Api
      name: domain.local
      # -- Path type of the host record.
      # @section -- Api
      pathType: Prefix
      # -- Path of the host record to manage routing.
      # @section -- Api
      path: /
    # -- Enable TLS configuration.
    # @section -- Api
    tls: []
    # - secretName: domain.local-tls
    #   hosts:
    #   - domain.local
  # Gateway API HTTPRoute configuration (alternative to Ingress)
  # Ref: https://gateway-api.sigs.k8s.io/api-types/httproute/
  httpRoute:
    # -- Enable an HTTPRoute resource for this service.
    # @section -- Api
    enabled: false
    # -- Additional HTTPRoute annotations.
    # @section -- Api
    annotations: {}
    # -- Additional HTTPRoute labels.
    # @section -- Api
    labels: {}
    # -- Parent references (Gateways) to attach the HTTPRoute to.
    # @section -- Api
    parentRefs: []
    # - name: my-gateway
    #   namespace: gateway-namespace  # optional
    #   sectionName: https            # optional, specific listener name
    # -- Hostnames for the HTTPRoute to match.
    # @section -- Api
    hostnames: []
    # - "example.com"
    # - "api.example.com"
    # -- Routing rules for the HTTPRoute.
    # @section -- Api
    rules: []
    # - matches:
    #   - path:
    #       type: PathPrefix     # PathPrefix, Exact, or RegularExpression
    #       value: "/"
    #     headers:
    #     - type: Exact
    #       name: "x-version"
    #       value: "v1"
    #     method: GET
    #   filters:
    #   - type: RequestHeaderModifier
    #     requestHeaderModifier:
    #       add:
    #       - name: "x-custom-header"
    #         value: "my-value"
    #   backendRefs:
    #   - name: my-service       # defaults to chart service if not set
    #     port: 80               # defaults to service port if not set
    #     weight: 100            # for traffic splitting
  # Gateway API GRPCRoute configuration (for gRPC services)
  # Ref: https://gateway-api.sigs.k8s.io/api-types/grpcroute/
  grpcRoute:
    # -- Enable a GRPCRoute resource for this service.
    # @section -- Api
    enabled: false
    # -- Additional GRPCRoute annotations.
    # @section -- Api
    annotations: {}
    # -- Additional GRPCRoute labels.
    # @section -- Api
    labels: {}
    # -- Parent references (Gateways) to attach the GRPCRoute to.
    # @section -- Api
    parentRefs: []
    # - name: my-gateway
    #   namespace: gateway-namespace
    #   sectionName: grpc
    # -- Hostnames for the GRPCRoute to match.
    # @section -- Api
    hostnames: []
    # - "grpc.example.com"
    # -- Routing rules for the GRPCRoute.
    # @section -- Api
    rules: []
    # - matches:
    #   - method:
    #       type: Exact          # Exact or RegularExpression
    #       service: "mypackage.MyService"
    #       method: "MyMethod"
    #     headers:
    #     - type: Exact
    #       name: "x-version"
    #       value: "v1"
    #   backendRefs:
    #   - name: my-grpc-service
    #     port: 50051
    #     weight: 100
  # -- Annotations for the app deployed pods.
  # @section -- Api
  podAnnotations: {}
  # -- Labels for the app deployed pods.
  # @section -- Api
  podLabels: {}
  # -- Toggle and define pod-level security context.
  # @section -- Api
  podSecurityContext: {}
  # fsGroup: 2000
  # -- Init containers to add to the app pod.
  # @section -- Api
  initContainers: []
  # - name: wait-for-keycloak
  #   image: docker.io/curlimages/curl:latest
  #   command:
  #   - "/bin/sh"
  #   - "-c"
  #   args:
  #   - "while [ $(curl -sw '%{http_code}' http://webapp.svc.cluster.local -o /dev/null) -ne 200 ]; do sleep 5; echo 'Waiting for the webapp...'; done"
  #   volumeMounts:
  #   - mountPath: /custom-volume
  #     name: custom-volume
  # -- Extra containers to add to the app pod as sidecars.
  # @section -- Api
  extraContainers: []
  # - name: fluentd
  #   image: "fluentd"
  #   volumeMounts:
  #     - mountPath: /my-volume/config
  #       name: config
  # -- Api container port number.
  # @section -- Api
  containerPort: &apiContainerPort 8080
  # -- Api container port name.
  # @section -- Api
  containerPortName: http
  # -- Api extra container ports.
  # @section -- Api
  extraPorts: []
  # - containerPort: 9090
  #   protocol: "TCP"
  # -- Api container command.
  # @section -- Api
  command: []
  # -- Api container command args.
  # @section -- Api
  args: []
  # -- Toggle and define container-level security context.
  # @section -- Api
  securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000
  # -- Api container env variables loaded from configmap or secret reference.
  # @section -- Api
  envFrom: []
  # - configMapRef:
  #     name: my-config
  # - secretRef:
  #     name: my-secret
  # -- Map or array of environment variables to inject into the app container (`valueFrom` supported).
  # @section -- Global
  env: {}
  # A: "A"
  # B:
  #   valueFrom:
  #     configMapKeyRef:
  #       name: "my-config"
  #       key: "B"
  # C:
  #   valueFrom:
  #     secretKeyRef:
  #       name: "my-secret"
  #       key: "C"
  #
  # - name: "A"
  #   value: "A"
  # - name: "B"
  #   valueFrom:
  #     configMapKeyRef:
  #       name: "my-config"
  #       key: "B"
  # - name: "C"
  #   valueFrom:
  #     secretKeyRef:
  #       name: "my-secret"
  #       key: "C"
  # -- Map of environment variables to inject into a configmap loaded by the app container (`valueFrom` not supported).
  # @section -- Global
  envCm: {}
  # D: "D"
  # -- Map of environment variables to inject into a secret loaded by the app container (`valueFrom` not supported).
  # @section -- Global
  envSecret: {}
  # E: "E"
  probes:
    startupProbe:
      httpGet:
        # -- Api container healthcheck endpoint (startupProbe is defined using `toYaml` so it is possible to override it completely).
        # @section -- Api
        path: /api/v1/healthz
        # -- Port to use for healthcheck (defaults to container port).
        # @section -- Api
        port: *apiContainerPort
      # -- Number of seconds after the container has started before probe is initiated.
      # @section -- Api
      initialDelaySeconds: 0
      # -- Minimum consecutive successes for the probe to be considered successful after having failed.
      # @section -- Api
      successThreshold: 1
      # -- Minimum consecutive failures for the probe to be considered failed after having succeeded.
      # @section -- Api
      failureThreshold: 10
      # -- How often (in seconds) to perform the probe.
      # @section -- Api
      periodSeconds: 10
      # -- Number of seconds after which the probe times out.
      # @section -- Api
      timeoutSeconds: 5
    readinessProbe:
      httpGet:
        # -- Api container healthcheck endpoint (readinessProbe is defined using `toYaml` so it is possible to override it completely).
        # @section -- Api
        path: /api/v1/readyz
        # -- Port to use for healthcheck (defaults to container port).
        # @section -- Api
        port: *apiContainerPort
      # -- Number of seconds after the container has started before probe is initiated.
      # @section -- Api
      initialDelaySeconds: 10
      # -- Minimum consecutive successes for the probe to be considered successful after having failed.
      # @section -- Api
      successThreshold: 2
      # -- Minimum consecutive failures for the probe to be considered failed after having succeeded.
      # @section -- Api
      failureThreshold: 2
      # -- How often (in seconds) to perform the probe.
      # @section -- Api
      periodSeconds: 10
      # -- Number of seconds after which the probe times out.
      # @section -- Api
      timeoutSeconds: 5
    livenessProbe:
      httpGet:
        # -- Api container healthcheck endpoint (livenessProbe is defined using `toYaml` so it is possible to override it completely).
        # @section -- Api
        path: /api/v1/livez
        # -- Port to use for healthcheck (defaults to container port).
        # @section -- Api
        port: *apiContainerPort
      # -- Number of seconds after the container has started before probe is initiated.
      # @section -- Api
      initialDelaySeconds: 30
      # -- Minimum consecutive successes for the probe to be considered successful after having failed.
      # @section -- Api
      successThreshold: 1
      # -- Minimum consecutive failures for the probe to be considered failed after having succeeded.
      # @section -- Api
      failureThreshold: 3
      # -- How often (in seconds) to perform the probe.
      # @section -- Api
      periodSeconds: 30
      # -- Number of seconds after which the probe times out.
      # @section -- Api
      timeoutSeconds: 5
  strategy:
    # -- Strategy type used to replace old Pods by new ones, can be `Recreate` or `RollingUpdate`.
    # @section -- Api
    type: RollingUpdate
    rollingUpdate:
      # -- The maximum number of pods that can be unavailable during the update process.
      # @section -- Api
      maxUnavailable: 1
      # -- The maximum number of pods that can be scheduled above the desired number of pods.
      # @section -- Api
      maxSurge: 1
  # -- Image credentials configuration.
  # @section -- Api
  imagePullSecrets: []
  # - name: "pullsecret-name-1"
  #   create: false
  # - name: "pullsecret-name-2"
  #   create: true
  #   registry: ""
  #   username: ""
  #   password: ""
  #   email: ""
  # -- Host aliases that will be injected at pod-level into /etc/hosts.
  # @section -- Api
  hostAliases: []
  # - ip: "127.0.0.1"
  #   hostnames:
  #   - "foo.local"
  #   - "bar.local"
  # - ip: "10.1.2.3"
  #   hostnames:
  #   - "foo.remote"
  #   - "bar.remote"
  # -- List of volumes to add.
  # @section -- Api
  volumes: []
  # - name: config-volume
  #   configMap:
  #     name: log-config
  #     items:
  #       - key: log_level
  #         path: log_level.conf
  # - name: cache-volume
  #   emptyDir:
  #     sizeLimit: 500Mi
  # - name: image-volume
  #   image:
  #     reference: quay.io/crio/artifact:v2
  #     pullPolicy: IfNotPresent
  # -- List of volumeClaims to add.
  # @section -- Api
  volumeClaims: []
  # - metadata:
  #     name: app-volume
  #   spec:
  #     accessModes: [ "ReadWriteOnce" ]
  #     storageClassName: "my-storage-class"
  #     resources:
  #       requests:
  #         storage: 1Gi
  # -- List of mounts to add (normally used with `volumes` or `volumeClaims`).
  # @section -- Api
  volumeMounts: []
  # - name: config-volume
  #   mountPath: /app/config
  #   subPath: config
  #   readOnly: true
  #   mountPropagation: None
  #   recursiveReadOnly: Enabled
  # - name: cache-volume
  #   mountPath: /app/cache
  # - name: image-volume
  #   mountPath: /app/content
  # - name: storage-volume
  #   mountPath: /app/storage
  service:
    # -- Type of service to create for the app.
    # @section -- Api
    type: ClusterIP
    # -- Port used by the service.
    # @section -- Api
    port: 80
    # -- Port used when type is `NodePort` to expose the service on the given node port.
    # @section -- Api
    nodePort: 31000
    # -- Port name used by the service.
    # @section -- Api
    portName: http
    # -- Protocol used by the service.
    # @section -- Api
    protocol: TCP
    # -- Extra service ports.
    # @section -- Api
    extraPorts: []
    # - port: 9090
    #   targetPort: 9090
    #   protocol: "TCP"
    #   name: "metrics"
  resources:
    requests:
      # -- Memory request for the app.
      # @section -- Api
      memory: 256Mi
      # -- CPU request for the app.
      # @section -- Api
      cpu: 100m
      # Other stuff like GPU, etc could be added here.
      # nvidia.com/gpu: "1"
      # ephemeral-storage: "100Mi"
    limits:
      # -- Memory limit for the app.
      # @section -- Api
      memory: 2Gi
      # -- CPU limit for the app.
      # @section -- Api
      cpu: 500m
      # Other stuff like GPU, etc could be added here.
      # nvidia.com/gpu: "1"
      # ephemeral-storage: "500Mi"
  autoscaling:
    # -- Enable Horizontal Pod Autoscaler for the app.
    # @section -- Api
    enabled: false
    # -- Minimum number of replicas for the app.
    # @section -- Api
    minReplicas: 1
    # -- Maximum number of replicas for the app.
    # @section -- Api
    maxReplicas: 3
    # -- Average CPU utilization percentage for the app.
    # @section -- Api
    targetCPUUtilizationPercentage: 80
    # -- Average memory utilization percentage for the app.
    # @section -- Api
    targetMemoryUtilizationPercentage: 80
  # -- Revision history limit for the app.
  # @section -- Api
  revisionHistoryLimit: 10
  # -- Default node selector for app.
  # @section -- Api
  nodeSelector: {}
  # kubernetes.io/os: "linux"
  # kubernetes.io/arch: "amd64"
  # kubernetes.io/hostname: "node1"
  # -- Default tolerations for app.
  # @section -- Api
  tolerations: []
  # - key: "key1"
  #   operator: "Equal"
  #   value: "value1"
  #   effect: "NoSchedule"
  #   tolerationSeconds: 3600
  # - key: "key2"
  #   operator: "Equal"
  #   value: "value2"
  #   effect: "NoExecute"
  #   tolerationSeconds: 3600
  # - key: "key3"
  #   operator: "Exists"
  #   effect: "PreferNoSchedule"
  #   tolerationSeconds: 3600
  # -- Affinity used for app pod.
  # @section -- Api
  affinity: {}
