<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Template Monorepo TS</title>
    <script>
      // Apply dark mode class before first paint to prevent flash of unstyled content.
      // Mirrors the logic in apps/web/src/stores/theme.ts → getUserDarkPreference().
      ;(function () {
        var stored = localStorage.getItem('theme-dark-mode')
        var dark = stored === 'dark' || (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script src="/config.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
