server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  large_client_header_buffers 4 32k;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' '__CONFIG_JS_HASH__'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' __CONNECT_SRC_EXTRA__; manifest-src 'self'; frame-ancestors 'none'; frame-src 'self';" always;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Runtime config must not be cached — values change per deployment.
  location = /config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
