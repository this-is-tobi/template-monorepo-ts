server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  large_client_header_buffers 4 32k;

  # Silence kube-probe health checks from access logs
  set $loggable 1;
  if ($http_user_agent ~* "kube-probe") {
    set $loggable 0;
  }
  access_log /var/log/nginx/access.log main if=$loggable;

  # --- Shared security headers (must be repeated in every location that uses add_header) ---
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' __CONNECT_SRC_EXTRA__; manifest-src 'self'; frame-ancestors 'none'; frame-src 'self';" always;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Runtime config must not be cached — values change per deployment.
  # NOTE: add_header inside a location block replaces all parent-level
  # add_header directives, so security headers must be repeated here.
  location = /config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' __CONNECT_SRC_EXTRA__; manifest-src 'self'; frame-ancestors 'none'; frame-src 'self';" always;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' __CONNECT_SRC_EXTRA__; manifest-src 'self'; frame-ancestors 'none'; frame-src 'self';" always;
  }
}
