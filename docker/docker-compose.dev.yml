services:
  api:
    image: template-monorepo-ts/api:dev
    container_name: template-monorepo-ts_api
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: dev
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: always
    working_dir: /app
    ports:
    - 8081:8081
    env_file:
    - ../apps/api/.env.docker
    develop:
      watch:
      - action: sync
        path: ../apps/api
        target: /app/apps/api
        ignore:
        - node_modules/
      - action: sync
        path: ../packages/shared
        target: /app/packages/shared
        ignore:
        - node_modules/
      - action: rebuild
        path: package.json
    networks:
    - template-monorepo-ts-network

  docs:
    image: template-monorepo-ts/docs:dev
    container_name: template-monorepo-ts_docs
    build:
      context: ..
      dockerfile: apps/docs/Dockerfile
      target: dev
    restart: always
    working_dir: /app
    ports:
    - 8082:8082
    volumes:
    - ../apps/docs:/app/apps/docs
    networks:
    - template-monorepo-ts-network

  db:
    image: docker.io/postgres:17.6
    container_name: template-monorepo-ts_postgres
    restart: always
    ports:
    - 5432:5432
    environment:
      POSTGRES_DB: template-monorepo-ts
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
    - template-monorepo-ts-data-dev:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U admin -d template-monorepo-ts
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
    - template-monorepo-ts-network
    attach: false

  migrate:
    image: template-monorepo-ts/api:migrate
    container_name: template-monorepo-ts_migrate
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
    - API__DB_URL=postgresql://admin:admin@db:5432/template-monorepo-ts?schema=public
    networks:
    - template-monorepo-ts-network
    restart: no

volumes:
  template-monorepo-ts-data-dev:

networks:
  template-monorepo-ts-network:
    driver: bridge
    # driver_opts:
    # com.docker.network.driver.mtu: 1450
