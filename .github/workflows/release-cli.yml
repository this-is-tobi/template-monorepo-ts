name: Build CLI Binaries

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-cli:
    name: Build CLI release assets
    runs-on: ubuntu-latest
    steps:
    - name: Checks-out repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Bun
      uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Build shared package
      run: cd packages/shared && bun run build

    - name: Compile CLI binaries
      run: |
        mkdir -p ./assets
        bun build --compile --target=bun-linux-x64   packages/cli/src/index.ts --outfile ./assets/tmts-linux-x64
        bun build --compile --target=bun-linux-arm64 packages/cli/src/index.ts --outfile ./assets/tmts-linux-arm64
        bun build --compile --target=bun-darwin-x64  packages/cli/src/index.ts --outfile ./assets/tmts-darwin-x64
        bun build --compile --target=bun-darwin-arm64 packages/cli/src/index.ts --outfile ./assets/tmts-darwin-arm64
        bun build --compile --target=bun-windows-x64 packages/cli/src/index.ts --outfile ./assets/tmts-windows-x64.exe

    - name: Generate checksums
      working-directory: ./assets
      run: |
        sha256sum tmts-* > checksums-sha256.txt
        cat checksums-sha256.txt

    - name: Upload release assets
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: cli-release-assets
        path: ./assets/
        retention-days: 1
