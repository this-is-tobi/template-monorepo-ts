name: Release CLI Binaries

on:
  workflow_call:
    inputs:
      TAG:
        required: true
        type: string
        description: Release version tag (e.g., 1.0.0)

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build CLI binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
        - target: linux-x64
          os: ubuntu-latest
          bun-target: bun-linux-x64
          binary: tmts-linux-x64
        - target: linux-arm64
          os: ubuntu-latest
          bun-target: bun-linux-arm64
          binary: tmts-linux-arm64
        - target: darwin-x64
          os: macos-13
          bun-target: bun-darwin-x64
          binary: tmts-darwin-x64
        - target: darwin-arm64
          os: macos-14
          bun-target: bun-darwin-arm64
          binary: tmts-darwin-arm64
        - target: windows-x64
          os: ubuntu-latest
          bun-target: bun-windows-x64
          binary: tmts-windows-x64.exe
    steps:
    - name: Checks-out repository
      uses: actions/checkout@v6

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Build shared package
      run: cd packages/shared && bun run build

    - name: Compile CLI binary
      run: |
        bun build --compile \
          --target=${{ matrix.bun-target }} \
          packages/cli/src/index.ts \
          --outfile ${{ matrix.binary }}

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.binary }}
        path: ${{ matrix.binary }}
        retention-days: 1

  publish-release:
    name: Publish binaries to release
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./binaries
        merge-multiple: true

    - name: Generate checksums
      working-directory: ./binaries
      run: |
        sha256sum tmts-* > checksums-sha256.txt
        cat checksums-sha256.txt

    - name: Upload release assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ inputs.TAG }}
        files: |
          binaries/tmts-*
          binaries/checksums-sha256.txt
